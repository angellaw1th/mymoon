<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sun, moon and you</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Ma Shan Zheng', cursive, sans-serif;
        }
        
        html, body {
            background-color: #f9f3f5;
            color: #333;
            height: 100%;
            width: 100%;
            overflow: hidden;
            position: fixed;
        }
        
        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s;
            padding: 20px;
        }
        
        #login-page {
            background: linear-gradient(rgba(255, 240, 245, 0.9), rgba(255, 240, 245, 0.9)), 
                        url('bg-home.jpg') center/cover no-repeat;
        }
        
        .secret-title {
            font-size: 2.8rem;
            color: #ff6b93;
            text-align: center;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            letter-spacing: 2px;
        }
        
        .secret-input {
            width: 300px;
            max-width: 90%;
            padding: 15px;
            font-size: 1.2rem;
            border: 3px solid #ffb6c1;
            border-radius: 25px;
            outline: none;
            text-align: center;
            margin-bottom: 25px;
            background-color: rgba(255, 255, 255, 0.9);
            color: #555;
            transition: all 0.3s;
        }
        
        .secret-input:focus {
            border-color: #ff6b93;
            box-shadow: 0 0 10px rgba(255, 107, 147, 0.5);
        }
        
        .start-btn {
            padding: 15px 50px;
            font-size: 1.5rem;
            background-color: #ff6b93;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(255, 107, 147, 0.4);
            letter-spacing: 2px;
        }
        
        .start-btn:hover {
            background-color: #ff4d7d;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 107, 147, 0.6);
        }
        
        .start-btn:active {
            transform: translateY(0);
        }
        
        #chat-page {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
            position: relative;
        }
        
        .chat-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('bg-chat.jpg') center/cover no-repeat;
            opacity: 0.2;
            z-index: -1;
        }
        
        .chat-header {
            background-color: rgba(255, 182, 193, 0.5);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(5px);
            border-bottom: 1px solid rgba(255, 182, 193, 0.3);
            position: relative;
            z-index: 10;
            width: 100%;
            flex-shrink: 0;
        }
        
        .chat-partner {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .partner-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid white;
            cursor: pointer;
        }
        
        .partner-info {
            display: flex;
            flex-direction: column;
        }
        
        .partner-name {
            font-size: 1.4rem;
            color: #ff6b93;
            font-weight: bold;
        }
        
        .partner-status {
            font-size: 0.9rem;
            color: #888;
        }
        
        .date-icon {
            font-size: 1.5rem;
            color: #ff6b93;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: background-color 0.2s;
        }
        
        .date-icon:hover {
            background-color: rgba(255, 107, 147, 0.1);
        }
        
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            transition: transform 0.3s ease;
            padding-bottom: 120px;
            position: relative;
        }
        
        .message {
            display: flex;
            max-width: 85%;
            animation: fadeIn 0.3s;
            margin-bottom: 5px;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message-sender {
            align-self: flex-end;
            flex-direction: row;
        }
        
        .message-receiver {
            align-self: flex-start;
            flex-direction: row;
        }
        
        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid white;
            align-self: flex-end;
        }
        
        .message-bubble {
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 1.1rem;
            line-height: 1.4;
            position: relative;
            word-break: break-word;
            max-width: 100%;
        }
        
        .sender-bubble {
            background-color: #FFF9E6;
            border-bottom-right-radius: 5px;
            margin-left: 8px;
            margin-right: 8px;
        }
        
        .receiver-bubble {
            background-color: #FFD1DC;
            border-bottom-left-radius: 5px;
            margin-left: 8px;
            margin-right: 8px;
        }
        
        .message-time {
            font-size: 0.7rem;
            color: #999;
            margin-top: 3px;
            text-align: center;
            width: 100%;
        }
        
        .time-separator {
            text-align: center;
            width: 100%;
            padding: 3px 0;
            font-size: 0.8rem;
            color: rgba(153, 153, 153, 0.7);
            background-color: rgba(255, 255, 255, 0.6);
            border-radius: 10px;
            margin: 5px 0;
            z-index: 1;
            backdrop-filter: blur(2px);
        }
        
        .chat-input-area {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: rgba(255, 249, 249, 0.95);
            padding: 10px 20px 20px;
            display: flex;
            flex-direction: column;
            border-top: 1px solid #ffd1dc;
            z-index: 10;
            transition: transform 0.3s ease;
        }
        
        .emoji-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            padding: 0 5px;
        }
        
        .emoji-toggle {
            background: none;
            border: none;
            font-size: 1.2rem;
            color: #ff6b93;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 5px;
            transition: background-color 0.2s;
        }
        
        .emoji-toggle:hover {
            background-color: rgba(255, 107, 147, 0.1);
        }
        
        .emoji-picker {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 10px;
            padding: 10px;
            background-color: white;
            border-radius: 15px;
            border: 1px solid #ffd1dc;
            overflow-y: auto;
            max-height: 150px;
            width: 100%;
            transition: all 0.3s ease;
        }
        
        .emoji-picker.collapsed {
            max-height: 0;
            padding: 0;
            border: none;
            margin: 0;
            overflow: hidden;
        }
        
        .emoji {
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px 8px;
            border-radius: 8px;
            transition: background-color 0.2s;
            flex-shrink: 0;
        }
        
        .emoji:hover, .emoji:active {
            background-color: #ffebee;
        }
        
        .input-row {
            display: flex;
            gap: 10px;
            align-items: center;
            width: 100%;
        }
        
        .chat-input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #ffb6c1;
            border-radius: 25px;
            font-size: 1.1rem;
            outline: none;
            background-color: white;
            resize: none;
            min-height: 50px;
            max-height: 120px;
            font-family: inherit;
        }
        
        .send-btn {
            padding: 12px 18px;
            background-color: #ff6b93;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 55px;
            height: 55px;
            flex-shrink: 0;
        }
        
        .send-btn:hover {
            background-color: #ff4d7d;
            transform: scale(1.05);
        }
        
        .keyboard-open .chat-container {
            transform: translateY(-250px);
        }
        
        .keyboard-open .chat-input-area {
            transform: translateY(-250px);
        }
        
        .date-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
        }
        
        .date-container {
            background-color: white;
            border-radius: 20px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .date-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #ffd1dc;
        }
        
        .date-title {
            font-size: 1.5rem;
            color: #ff6b93;
        }
        
        .close-date {
            font-size: 1.8rem;
            color: #999;
            cursor: pointer;
            padding: 5px;
        }
        
        .calendar-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .nav-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            color: #ff6b93;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 5px;
            transition: background-color 0.2s;
        }
        
        .nav-btn:hover {
            background-color: rgba(255, 107, 147, 0.1);
        }
        
        .current-month {
            font-size: 1.2rem;
            color: #ff6b93;
            font-weight: bold;
        }
        
        .year-selector {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .year-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            color: #ff6b93;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 5px;
            transition: background-color 0.2s;
        }
        
        .year-btn:hover {
            background-color: rgba(255, 107, 147, 0.1);
        }
        
        .current-year {
            font-size: 1.3rem;
            color: #ff6b93;
            font-weight: bold;
        }
        
        .calendar {
            width: 100%;
        }
        
        .calendar-header {
            display: flex;
            justify-content: space-around;
            margin-bottom: 10px;
        }
        
        .calendar-header div {
            width: 14%;
            text-align: center;
            color: #ff6b93;
            font-weight: bold;
            font-size: 0.9rem;
        }
        
        .calendar-body {
            display: flex;
            flex-wrap: wrap;
        }
        
        .calendar-day {
            width: 14%;
            aspect-ratio: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border-radius: 50%;
            margin: 1px 0;
            transition: all 0.2s;
            position: relative;
        }
        
        .calendar-day:hover {
            background-color: rgba(255, 107, 147, 0.1);
        }
        
        .calendar-day.empty {
            cursor: default;
            background-color: transparent;
        }
        
        .calendar-day.empty:hover {
            background-color: transparent;
        }
        
        .calendar-day.today {
            background-color: rgba(255, 107, 147, 0.2);
            color: #ff6b93;
            font-weight: bold;
        }
        
        .calendar-day.has-messages {
            background-color: rgba(255, 107, 147, 0.3);
            color: #ff6b93;
            font-weight: bold;
        }
        
        .calendar-day.has-messages:hover {
            background-color: rgba(255, 107, 147, 0.4);
        }
        
        .calendar-day.selected {
            background-color: #ff6b93;
            color: white;
        }
        
        .message-count {
            position: absolute;
            bottom: 2px;
            right: 2px;
            font-size: 0.6rem;
            background-color: #ff6b93;
            color: white;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #profile-page {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }
        
        .profile-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('bg-profile.jpg') center/cover no-repeat;
            opacity: 0.15;
            z-index: -1;
        }
        
        .profile-header {
            background-color: rgba(255, 182, 193, 0.5);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
            z-index: 10;
            width: 100%;
        }
        
        .back-btn {
            font-size: 1.8rem;
            color: #ff6b93;
            cursor: pointer;
            padding: 5px;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }
        
        .back-btn:hover {
            background-color: rgba(255, 107, 147, 0.1);
        }
        
        .profile-title {
            font-size: 1.5rem;
            color: #ff6b93;
        }
        
        .profile-content {
            flex: 1;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            width: 100%;
            overflow-y: auto;
        }
        
        .profile-avatar-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
        }
        
        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .nickname-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .nickname {
            font-size: 2rem;
            color: #ff6b93;
            font-weight: bold;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 10px;
            transition: background-color 0.2s;
        }
        
        .nickname:hover {
            background-color: rgba(255, 107, 147, 0.1);
        }
        
        .edit-icon {
            font-size: 1.3rem;
            color: #ff6b93;
            cursor: pointer;
            padding: 5px;
            border-radius: 50%;
            transition: background-color 0.2s;
        }
        
        .edit-icon:hover {
            background-color: rgba(255, 107, 147, 0.1);
        }
        
        .status-container {
            background-color: white;
            border-radius: 15px;
            padding: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            border: 2px solid #ffd1dc;
        }
        
        .status-title {
            font-size: 1.3rem;
            color: #ff6b93;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .status-content {
            font-size: 1.2rem;
            color: #666;
            text-align: center;
            padding: 10px;
            border-radius: 10px;
            background-color: #fff9f9;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .stats-container {
            background-color: white;
            border-radius: 15px;
            padding: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            border: 2px solid #ffd1dc;
        }
        
        .stats-title {
            font-size: 1.3rem;
            color: #ff6b93;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .stats-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 200px;
            overflow-y: auto;
            padding: 10px;
        }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            border-radius: 8px;
            background-color: #fff9f9;
        }
        
        .stat-item:hover {
            background-color: #ffebee;
        }
        
        .relationship-status {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #ff6b93;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 107, 147, 0.4);
            transition: all 0.3s;
            z-index: 10;
        }
        
        .relationship-status:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(255, 107, 147, 0.6);
        }
        
        .days-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 200;
            display: none;
            justify-content: center;
            align-items: center;
        }
        
        .days-container {
            background-color: white;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .days-title {
            font-size: 1.8rem;
            color: #ff6b93;
            margin-bottom: 20px;
        }
        
        .days-count {
            font-size: 3.5rem;
            color: #ff6b93;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .days-text {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 20px;
        }
        
        .close-days {
            padding: 10px 25px;
            background-color: #ff6b93;
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .close-days:hover {
            background-color: #ff4d7d;
        }
        
        .nickname-edit {
            display: none;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            max-width: 300px;
        }
        
        .nickname-input {
            padding: 12px;
            border: 2px solid #ffb6c1;
            border-radius: 10px;
            font-size: 1.2rem;
            outline: none;
            text-align: center;
        }
        
        .nickname-buttons {
            display: flex;
            gap: 10px;
        }
        
        .nickname-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .nickname-save {
            background-color: #ff6b93;
            color: white;
        }
        
        .nickname-save:hover {
            background-color: #ff4d7d;
        }
        
        .nickname-cancel {
            background-color: #f0f0f0;
            color: #666;
        }
        
        .nickname-cancel:hover {
            background-color: #e0e0e0;
        }
        
        @media (max-width: 768px) {
            .secret-title {
                font-size: 2.2rem;
            }
            
            .secret-input {
                width: 90%;
                max-width: 300px;
            }
            
            .message {
                max-width: 85%;
            }
            
            .profile-avatar {
                width: 100px;
                height: 100px;
            }
            
            .nickname {
                font-size: 1.8rem;
            }
            
            .calendar-day {
                font-size: 0.9rem;
            }
            
            .emoji-picker {
                max-height: 120px;
            }
        }
        
        @media (max-width: 480px) {
            .secret-title {
                font-size: 1.8rem;
            }
            
            .partner-name {
                font-size: 1.2rem;
            }
            
            .message-bubble {
                font-size: 1rem;
                padding: 10px 15px;
            }
            
            .emoji {
                font-size: 1.3rem;
                padding: 4px 6px;
            }
            
            .chat-input {
                padding: 10px 15px;
                font-size: 1rem;
            }
            
            .send-btn {
                width: 50px;
                height: 50px;
                padding: 10px 15px;
            }
            
            .profile-avatar {
                width: 90px;
                height: 90px;
            }
            
            .nickname {
                font-size: 1.6rem;
            }
            
            .calendar-day {
                font-size: 0.8rem;
            }
            
            .keyboard-open .chat-container {
                transform: translateY(-300px);
            }
            
            .keyboard-open .chat-input-area {
                transform: translateY(-300px);
            }
            
            .emoji-picker {
                max-height: 100px;
            }
        }
        
        @media (max-width: 360px) {
            .secret-title {
                font-size: 1.5rem;
            }
            
            .start-btn {
                padding: 12px 40px;
                font-size: 1.3rem;
            }
            
            .emoji {
                font-size: 1.2rem;
                padding: 3px 5px;
            }
            
            .chat-input-area {
                padding: 8px 15px 15px;
            }
            
            .calendar-day {
                font-size: 0.7rem;
            }
        }
        
        @media (max-height: 600px) {
            .keyboard-open .chat-container {
                transform: translateY(-200px);
            }
            
            .keyboard-open .chat-input-area {
                transform: translateY(-200px);
            }
            
            .emoji-picker {
                max-height: 80px;
            }
        }
    </style>
</head>
<body>

        function initEmojis() {
            emojiPicker.innerHTML = '';

                emojiElement.className = 'emoji';
                emojiElement.textContent = emoji;
                emojiElement.dataset.emoji = emoji;
                emojiPicker.appendChild(emojiElement);
            });
            
            initEmojiPickerEvents();
        }
        
        function initEmojiPickerEvents() {
            document.querySelectorAll('.emoji').forEach(emoji => {
                emoji.replaceWith(emoji.cloneNode(true));
            });
            
            const emojiElements = document.querySelectorAll('.emoji');
            
            emojiElements.forEach(emoji => {
                emoji.addEventListener('click', handleEmojiClick);
                emoji.addEventListener('touchstart', handleEmojiTouchStart, {passive: true});
                emoji.addEventListener('touchend', handleEmojiTouchEnd);
            });
            
            emojiPicker.addEventListener('click', function(e) {
                if (e.target === this) {
                    e.preventDefault();
                    e.stopPropagation();
                }
            });
        }
        
        function handleEmojiClick(e) {
            e.preventDefault();
            e.stopPropagation();
            
            const emoji = e.target.dataset.emoji;
            if (!emoji || isProcessingEmoji) return;
            
            const now = Date.now();
            if (now - lastEmojiClickTime < 500) return;
            
            lastEmojiClickTime = now;
            isProcessingEmoji = true;
            
            const input = chatInput;
            const wasFocused = document.activeElement === input;
            const start = input.selectionStart;
            const end = input.selectionEnd;
            const text = input.value;
            
            const newText = text.substring(0, start) + emoji + text.substring(end);
            input.value = newText;
            
            if (wasFocused) {
                requestAnimationFrame(() => {
                    input.focus();
                    input.setSelectionRange(start + emoji.length, start + emoji.length);
                    
                    setTimeout(() => {
                        isProcessingEmoji = false;
                    }, 100);
                });
            } else {
                input.focus();
                requestAnimationFrame(() => {
                    input.setSelectionRange(start + emoji.length, start + emoji.length);
                    
                    setTimeout(() => {
                        isProcessingEmoji = false;
                    }, 100);
                });
            }
        }
        
        function handleEmojiTouchStart(e) {
            e.preventDefault();
            e.stopPropagation();
        }
        
        function handleEmojiTouchEnd(e) {
            e.preventDefault();
            e.stopPropagation();
            
            const emoji = e.target.dataset.emoji;
            if (!emoji || isProcessingEmoji) return;

                });
            }
        }
        
        function toggleEmojiPicker() {
            isEmojiPickerCollapsed = !isEmojiPickerCollapsed;
            if (isEmojiPickerCollapsed) {
                emojiPicker.classList.add('collapsed');
                emojiToggle.textContent = '▽';
            } else {
                emojiPicker.classList.remove('collapsed');
                emojiToggle.textContent = '△';
            }
            localStorage.setItem('emojiPickerCollapsed', isEmojiPickerCollapsed);
        }
        
        function updateEmojiToggle() {
            const savedState = localStorage.getItem('emojiPickerCollapsed');
            if (savedState !== null) {
                isEmojiPickerCollapsed = savedState === 'true';
            }
            
            if (isEmojiPickerCollapsed) {
                emojiPicker.classList.add('collapsed');
                emojiToggle.textContent = '▽';
            } else {
                emojiPicker.classList.remove('collapsed');
                emojiToggle.textContent = '△';
            }
        }

                        document.body.classList.add('keyboard-open');
                        isKeyboardOpen = true;

                    } else if (newHeight > originalHeight - 50) {

            const chatContainer = document.getElementById('chat-container');

                chatInputArea.style.transform = `translateY(-${moveUp}px)`;
            }
        }
        
        function isMobileDevice() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) ||

        }
        
        function adjustLayout() {
            const vw = Math.max(document.documentElement.clientWidth || 0, window.innerWidth || 0);
            const messageElements = document.querySelectorAll('.message');
            messageElements.forEach(msg => {

                    msg.style.maxWidth = '90%';
                } else {

        }

        function sendMessage() {
            const messageText = chatInput.value.trim();
            if (messageText === '') return;
            
            const now = new Date();
            const message = {
                id: Date.now(),
                text: messageText,
                sender: 'user',
                time: now,
                date: getFormattedDate(now)
            };
            
            messages.push(message);
            chatInput.value = '';
            renderChatMessages();
            scrollToBottom();

            partnerStatus.textContent = '对方正在输入中...';
            setTimeout(() => {

            }, 2000);
            
            lastMessageTime = now;
        }
        
        function sendAutoReply() {
            const random = Math.random();
            let replyCount;
            if (random < 0.6) replyCount = 1;
            else if (random < 0.8) replyCount = 2;
            else replyCount = 3;
            
            for (let i = 0; i < replyCount; i++) {
                setTimeout(() => {
                    const replyText = replyMessages[Math.floor(Math.random() * replyMessages.length)];
                    if (replyStats[replyText]) replyStats[replyText]++;
                    else replyStats[replyText] = 1;
                    
                    const now = new Date();
                    const replyMessage = {
                        id: Date.now() + i,
                        text: replyText,
                        sender: 'partner',
                        time: now,
                        date: getFormattedDate(now)
                    };
                    
                    messages.push(replyMessage);
                    renderChatMessages();
                    scrollToBottom();
                    saveToLocalStorage();
                    
                    if (i === replyCount - 1) {
                        partnerStatus.textContent = '在线';
                        updateProfilePage();
                    }
                }, i * 1500);
            }
        }
        
        function renderChatMessages() {
            chatContainer.innerHTML = '';
            if (messages.length === 0) {
                const emptyMsg = document.createElement('div');
                emptyMsg.textContent = '还没有消息，开始聊天吧～';
                emptyMsg.style.textAlign = 'center';
                emptyMsg.style.color = '#999';
                emptyMsg.style.padding = '20px';
                chatContainer.appendChild(emptyMsg);
                return;
            }
            
            const messagesByDate = groupMessagesByDate();
            Object.keys(messagesByDate).forEach(date => {
                const dateDivider = document.createElement('div');
                dateDivider.className = 'date-divider';
                dateDivider.textContent = date;
                dateDivider.style.textAlign = 'center';
                dateDivider.style.margin = '15px 0';
                dateDivider.style.color = '#ff6b93';
                dateDivider.style.fontSize = '0.9rem';
                chatContainer.appendChild(dateDivider);
                
                let lastTime = null;
                messagesByDate[date].forEach((msg, index) => {
                    const prevMsg = index > 0 ? messagesByDate[date][index - 1] : null;
                    const timeSeparator = shouldShowTimeSeparator(msg, prevMsg);
                    if (timeSeparator) {
                        const timeDiv = document.createElement('div');
                        timeDiv.className = 'time-separator';
                        timeDiv.textContent = formatTime(msg.time);
                        chatContainer.appendChild(timeDiv);
                    }
                    
                    chatContainer.appendChild(createMessageElement(msg));
                    lastTime = msg.time;
                });
            });
        }
        
        function shouldShowTimeSeparator(currentMsg, previousMsg) {
            if (!previousMsg) return true;
            
            const currentTime = currentMsg.time.getTime();
            const previousTime = previousMsg.time.getTime();
            const timeDiff = (currentTime - previousTime) / (1000 * 60);
            
            return timeDiff >= 5;
        }
        
        function createMessageElement(message) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${message.sender === 'user' ? 'message-sender' : 'message-receiver'}`;
            messageDiv.dataset.id = message.id;
            
            const avatar = document.createElement('img');
            avatar.className = 'message-avatar';
            avatar.src = message.sender === 'user' ? 'avatar-1.png' : 'avatar-2.png';
            avatar.alt = message.sender === 'user' ? '我的头像' : '对方头像';
            
            const bubble = document.createElement('div');
            bubble.className = `message-bubble ${message.sender === 'user' ? 'sender-bubble' : 'receiver-bubble'}`;
            bubble.textContent = message.text;
            
            if (message.sender === 'user') {
                messageDiv.appendChild(bubble);
                messageDiv.appendChild(avatar);
            } else {
                messageDiv.appendChild(avatar);
                messageDiv.appendChild(bubble);
            }
            
            return messageDiv;
        }
        
        function groupMessagesByDate() {
            const grouped = {};
            messages.forEach(msg => {
                const date = msg.date;
                if (!grouped[date]) grouped[date] = [];
                grouped[date].push(msg);
            });
            return grouped;
        }
        
        function showDateModal() {
            dateModal.style.display = 'flex';
            const today = new Date();
            currentCalendarYear = today.getFullYear();
            currentCalendarMonth = today.getMonth();
            updateCalendar();
        }
        
        function updateCalendar() {
            currentYearElement.textContent = currentCalendarYear;
            currentMonthElement.textContent = `${currentCalendarMonth + 1}月`;
            calendar.innerHTML = '';
            
            const calendarHeader = document.createElement('div');
            calendarHeader.className = 'calendar-header';
            const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
            weekDays.forEach(day => {
                const dayElement = document.createElement('div');
                dayElement.textContent = day;
                calendarHeader.appendChild(dayElement);
            });
            calendar.appendChild(calendarHeader);
            
            const calendarBody = document.createElement('div');
            calendarBody.className = 'calendar-body';
            const firstDay = new Date(currentCalendarYear, currentCalendarMonth, 1);
            const lastDay = new Date(currentCalendarYear, currentCalendarMonth + 1, 0);
            const firstDayOfWeek = firstDay.getDay();
            const daysInMonth = lastDay.getDate();
            const today = new Date();
            const todayYear = today.getFullYear();
            const todayMonth = today.getMonth();
            const todayDate = today.getDate();
            const messagesByDate = getMessagesByDate();
            
            for (let i = 0; i < firstDayOfWeek; i++) {
                const emptyDay = document.createElement('div');
                emptyDay.className = 'calendar-day empty';
                calendarBody.appendChild(emptyDay);
            }
            
            for (let day = 1; day <= daysInMonth; day++) {
                const dayElement = document.createElement('div');
                dayElement.className = 'calendar-day';
                dayElement.textContent = day;
                
                if (currentCalendarYear === todayYear && 
                    currentCalendarMonth === todayMonth && 
                    day === todayDate) {
                    dayElement.classList.add('today');
                }
                
                const dateKey = `${currentCalendarYear}年${currentCalendarMonth + 1}月${day}日`;
                if (messagesByDate[dateKey]) {
                    dayElement.classList.add('has-messages');
                    const messageCount = document.createElement('div');
                    messageCount.className = 'message-count';
                    messageCount.textContent = messagesByDate[dateKey].length;
                    dayElement.appendChild(messageCount);
                }
                
                dayElement.addEventListener('click', () => {
                    if (messagesByDate[dateKey]) {
                        const dateMessages = messagesByDate[dateKey];
                        if (dateMessages.length > 0) {
                            const firstMsgId = dateMessages[0].id;
                            const messageElements = document.querySelectorAll('.message');
                            for (let element of messageElements) {
                                if (element.querySelector('.message-bubble')?.textContent.includes(dateMessages[0].text)) {
                                    element.scrollIntoView({ behavior: 'smooth' });
                                    break;
                                }
                            }
                        }
                        dateModal.style.display = 'none';
                    }
                });
                
                calendarBody.appendChild(dayElement);
            }
            calendar.appendChild(calendarBody);
        }
        
        function getMessagesByDate() {
            const grouped = {};
            messages.forEach(msg => {
                const date = msg.date;
                if (!grouped[date]) grouped[date] = [];
                grouped[date].push(msg);
            });
            return grouped;
        }
        
        function saveNickname() {
            const newNickname = nicknameInput.value.trim();
            if (newNickname === '') {
                alert('昵称不能为空');
                return;
            }
            nickname = newNickname;
            nicknameDisplay.textContent = nickname;
            partnerName.textContent = nickname;
            nicknameDisplay.style.display = 'block';
            nicknameEdit.style.display = 'none';
            localStorage.setItem('secretNickname', nickname);
        }
        
        function cancelNickname() {
            nicknameDisplay.style.display = 'block';
            nicknameEdit.style.display = 'none';
        }
        
        function updateProfilePage() {
            nicknameDisplay.textContent = nickname;
            setRandomStatus();
            updateStatsList();
        }
        
        function setRandomStatus() {
            const randomStatus = statusList[Math.floor(Math.random() * statusList.length)];
            statusContent.textContent = randomStatus;
            localStorage.setItem('secretStatus', randomStatus);
        }
        
        function updateStatsList() {
            statsList.innerHTML = '';
            if (Object.keys(replyStats).length === 0) {
                const noStats = document.createElement('div');
                noStats.textContent = '暂无消息统计';
                noStats.style.textAlign = 'center';
                noStats.style.padding = '20px';
                noStats.style.color = '#999';
                statsList.appendChild(noStats);
                return;
            }
            const sortedStats = Object.entries(replyStats)
                .sort((a, b) => b[1] - a[1])
                .map(([message, count]) => ({ message, count }));
            sortedStats.forEach(item => {
                const message = item.message;
                const count = item.count;
                const statItem = document.createElement('div');
                statItem.className = 'stat-item';
                const messageSpan = document.createElement('span');
                messageSpan.textContent = message.length > 15 ? message.substring(0, 15) + '...' : message;
                const countSpan = document.createElement('span');
                countSpan.textContent = `${count}次`;
                countSpan.style.color = '#ff6b93';
                countSpan.style.fontWeight = 'bold';
                statItem.appendChild(messageSpan);
                statItem.appendChild(countSpan);
                statsList.appendChild(statItem);
            });
        }
        
        function calculateDaysInRelationship() {
            const today = new Date();
            const startDate = relationshipStartDate;
            const timeDiff = today.getTime() - startDate.getTime();
            const daysDiff = Math.floor(timeDiff / (1000 * 3600 * 24));
            daysCount.textContent = daysDiff;
            document.getElementById('days-text').textContent = `从${startDate.getFullYear()}年${startDate.getMonth()+1}月${startDate.getDate()}日开始`;
            return daysDiff;
        }
        
        function showDaysModal() {
            daysModal.style.display = 'flex';
            calculateDaysInRelationship();
        }
        
        function scrollToBottom() {
            setTimeout(() => {
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }, 100);
        }
        
        function saveToLocalStorage() {
            localStorage.setItem('secretMessages', JSON.stringify(messages));
            localStorage.setItem('secretReplyStats', JSON.stringify(replyStats));
        }
        
        function loadFromLocalStorage() {
            const savedMessages = localStorage.getItem('secretMessages');
            if (savedMessages) {
                messages = JSON.parse(savedMessages);
                messages.forEach(msg => {
                    msg.time = new Date(msg.time);
                });
            }
            const savedStats = localStorage.getItem('secretReplyStats');
            if (savedStats) replyStats = JSON.parse(savedStats);
            const savedNickname = localStorage.getItem('secretNickname');
            if (savedNickname) {
                nickname = savedNickname;
                partnerName.textContent = nickname;
            }
            const savedStatus = localStorage.getItem('secretStatus');
            if (savedStatus) statusContent.textContent = savedStatus;
        }
        
        function getFormattedDate(date) {
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            const day = date.getDate();
            return `${year}年${month}月${day}日`;
        }
        
        function formatTime(date) {
            const hours = date.getHours().toString().padStart(2, '0');
            const minutes = date.getMinutes().toString().padStart(2, '0');
            return `${hours}:${minutes}`;
        }
    </script>
</body>
</html>
